<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUME | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 20% 50%, #667eea, #764ba2, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 20px;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInUp 0.5s ease;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
        }
        .auth-card h1 {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #fff, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-card input {
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            border-radius: 60px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            color: white;
            outline: none;
        }
        .auth-card input::placeholder { color: rgba(255,255,255,0.6); }
        .auth-card input:focus {
            border-color: #7c3aed;
            background: rgba(255,255,255,0.15);
        }
        .auth-card button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .auth-card button:hover { transform: translateY(-2px); }
        .google-btn {
            background: rgba(255,255,255,0.9);
            color: #333;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 80px;
            padding: 5px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            border-radius: 60px;
            font-weight: 600;
        }
        .auth-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeInUp 0.3s; }
        .error-msg { color: #fca5a5; font-size: 13px; margin-top: 12px; }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }
        .divider::before { margin-left: 10px; }
        .divider::after { margin-right: 10px; }
        .forgot-password {
            text-align: left;
            font-size: 12px;
            color: #a78bfa;
            cursor: pointer;
            margin-top: 5px;
        }
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="auth-card">
    <h1>✨ LUME ✨</h1>
    <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
        <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
    </div>
    <div id="loginForm" class="auth-form active">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        <div class="forgot-password" onclick="sendResetPassword()">نسيت كلمة المرور؟</div>
        <button id="loginBtn">🚀 تسجيل الدخول</button>
        <div class="divider">أو</div>
        <button id="googleLoginBtn" class="google-btn"><i class="fab fa-google"></i> تسجيل الدخول بحساب جوجل</button>
        <div id="loginMsg" class="error-msg"></div>
    </div>
    <div id="registerForm" class="auth-form">
        <input type="text" id="regName" placeholder="اسم المستخدم">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <input type="password" id="regConfirmPass" placeholder="تأكيد كلمة المرور">
        <button id="registerBtn">✨ إنشاء حساب</button>
        <div class="divider">أو</div>
        <button id="googleRegisterBtn" class="google-btn"><i class="fab fa-google"></i> التسجيل بحساب جوجل</button>
        <div id="regMsg" class="error-msg"></div>
    </div>
</div>
<script src="firebase-config.js"></script>
<script>
    function switchAuth(type) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        if (type === 'login') {
            document.querySelectorAll('.auth-tab')[0].classList.add('active');
            document.getElementById('loginForm').classList.add('active');
        } else {
            document.querySelectorAll('.auth-tab')[1].classList.add('active');
            document.getElementById('registerForm').classList.add('active');
        }
    }
    function showError(elementId, message) {
        const el = document.getElementById(elementId);
        el.innerHTML = message;
        setTimeout(() => { el.innerHTML = ''; }, 5000);
    }
    function setLoading(btnId, isLoading, text) {
        const btn = document.getElementById(btnId);
        if (isLoading) {
            btn.innerHTML = '<span class="loading"></span> جاري...';
            btn.disabled = true;
        } else {
            btn.innerHTML = text;
            btn.disabled = false;
        }
    }
    async function sendResetPassword() {
        const email = document.getElementById('loginEmail').value;
        if (!email) { showError('loginMsg', '⚠️ أدخل بريدك الإلكتروني'); return; }
        try {
            await auth.sendPasswordResetEmail(email);
            showError('loginMsg', '✅ تم إرسال رابط الاستعادة إلى بريدك');
        } catch(e) { showError('loginMsg', '❌ ' + e.message); }
    }
    document.getElementById('googleLoginBtn').onclick = async () => {
        try {
            const result = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            const user = result.user;
            const snap = await db.ref(`users/${user.uid}`).once('value');
            if (!snap.exists()) {
                await db.ref(`users/${user.uid}`).set({
                    name: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    bio: "مرحباً! أنا في LUME ✨",
                    avatar: user.photoURL || "",
                    cover: "", website: "", verified: false,
                    isAdmin: user.email === ADMIN_EMAIL,
                    blockedUsers: {}, mutedUntil: 0, createdAt: Date.now()
                });
            }
            window.location.href = 'index.html';
        } catch(e) { showError('loginMsg', '❌ ' + e.message); }
    };
    document.getElementById('googleRegisterBtn').onclick = async () => {
        try {
            const result = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            const user = result.user;
            const snap = await db.ref(`users/${user.uid}`).once('value');
            if (!snap.exists()) {
                await db.ref(`users/${user.uid}`).set({
                    name: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    bio: "مرحباً! أنا في LUME ✨",
                    avatar: user.photoURL || "",
                    cover: "", website: "", verified: false,
                    isAdmin: user.email === ADMIN_EMAIL,
                    blockedUsers: {}, mutedUntil: 0, createdAt: Date.now()
                });
            }
            window.location.href = 'index.html';
        } catch(e) { showError('regMsg', '❌ ' + e.message); }
    };
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { showError('loginMsg', '⚠️ أدخل البريد وكلمة المرور'); return; }
        setLoading('loginBtn', true, '🚀 تسجيل الدخول');
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const snap = await db.ref(`users/${cred.user.uid}`).once('value');
            if (!snap.exists()) {
                await db.ref(`users/${cred.user.uid}`).set({
                    name: cred.user.displayName || email.split('@')[0],
                    email: email, bio: "مرحباً! أنا في LUME ✨",
                    avatar: "", cover: "", website: "", verified: false,
                    isAdmin: email === ADMIN_EMAIL,
                    blockedUsers: {}, mutedUntil: 0, createdAt: Date.now()
                });
            }
            window.location.href = 'index.html';
        } catch(e) {
            let msg = '';
            switch(e.code) {
                case 'auth/user-not-found': msg = '❌ لا يوجد حساب'; break;
                case 'auth/wrong-password': msg = '❌ كلمة مرور خاطئة'; break;
                default: msg = '❌ ' + e.message;
            }
            showError('loginMsg', msg);
        } finally { setLoading('loginBtn', false, '🚀 تسجيل الدخول'); }
    };
    document.getElementById('registerBtn').onclick = async () => {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPass').value;
        const confirm = document.getElementById('regConfirmPass').value;
        if (!name || !email || !pass) { showError('regMsg', '⚠️ ملء جميع الحقول'); return; }
        if (pass !== confirm) { showError('regMsg', '⚠️ كلمة المرور غير متطابقة'); return; }
        if (pass.length < 6) { showError('regMsg', '⚠️ كلمة المرور 6 أحرف على الأقل'); return; }
        setLoading('registerBtn', true, '✨ إنشاء حساب');
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, pass);
            await cred.user.updateProfile({ displayName: name });
            await db.ref(`users/${cred.user.uid}`).set({
                name: name, email: email, bio: "مرحباً! أنا في LUME ✨",
                avatar: "", cover: "", website: "", verified: false,
                isAdmin: email === ADMIN_EMAIL,
                blockedUsers: {}, mutedUntil: 0, createdAt: Date.now()
            });
            window.location.href = 'index.html';
        } catch(e) {
            let msg = '';
            switch(e.code) {
                case 'auth/email-already-in-use': msg = '❌ البريد مستخدم'; break;
                default: msg = '❌ ' + e.message;
            }
            showError('regMsg', msg);
        } finally { setLoading('registerBtn', false, '✨ إنشاء حساب'); }
    };
    auth.onAuthStateChanged((user) => { if(user) window.location.href = 'index.html'; });
</script>
</body>
</html>
